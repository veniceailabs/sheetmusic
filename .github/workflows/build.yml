name: Build

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate spec
        run: npm run validate:spec

      - name: Build web app
        run: npm run build

  windows-exe:
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run desktop:build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: scoreforge-windows-installer
          path: dist/*
